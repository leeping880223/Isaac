# G1 右手臂的 robot descriptor：定義 cspace（廣義座標，對應 g1_right_arm.urdf 的 7 個關節）
# 以及每個連桿概略的碰撞球（半徑/位置皆為粗估，只求 RMPflow 避障不要太誇張，非精確值）。
api_version: 1.0

cspace:
    - right_shoulder_pitch_joint
    - right_shoulder_roll_joint
    - right_shoulder_yaw_joint
    - right_elbow_joint
    - right_wrist_roll_joint
    - right_wrist_pitch_joint
    - right_wrist_yaw_joint

root_link: torso_link

default_q: [0.0, 0.0, 0.0, 0.3, 0.0, 0.0, 0.0]

acceleration_limits: [10.0, 10.0, 10.0, 10.0, 10.0, 10.0, 10.0]
jerk_limits: [5000.0, 5000.0, 5000.0, 5000.0, 5000.0, 5000.0, 5000.0]

collision_spheres:
    - right_shoulder_pitch_link:
        - "center": [0.0, -0.02, 0.0]
          "radius": 0.06
    - right_shoulder_roll_link:
        - "center": [0.0, -0.03, -0.05]
          "radius": 0.055
    - right_shoulder_yaw_link:
        - "center": [0.0, 0.0, -0.04]
          "radius": 0.05
    - right_elbow_link:
        - "center": [0.05, 0.0, 0.0]
          "radius": 0.05
    - right_wrist_roll_link:
        - "center": [0.02, 0.0, 0.0]
          "radius": 0.04
    - right_wrist_pitch_link:
        - "center": [0.02, 0.0, 0.0]
          "radius": 0.035
    - right_wrist_yaw_link:
        - "center": [0.03, 0.0, 0.0]
          "radius": 0.035
