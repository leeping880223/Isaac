# RMPflow 調參，直接沿用 Isaac Sim 內建 Franka 範例的預設值當起點
# （~/isaac-sim/exts/isaacsim.robot_motion.motion_generation/motion_policy_configs/franka/rmpflow/franka_rmpflow_common.yaml），
# 只把 joint_limit_buffers 改成 7 維（對應 g1_right_arm.urdf 的 7 個關節）。
# 之後如果手臂在測試中有抖動/過衝，再回來調 rmp_params 底下的增益。

joint_limit_buffers: [.01, .01, .01, .01, .01, .01, .01]

rmp_params:
    cspace_target_rmp:
        metric_scalar: 50.
        position_gain: 100.
        damping_gain: 50.
        robust_position_term_thresh: .5
        inertia: 1.
    cspace_trajectory_rmp:
        p_gain: 100.
        d_gain: 10.
        ff_gain: .25
        weight: 50.
    cspace_affine_rmp:
        final_handover_time_std_dev: .25
        weight: 2000.
    joint_limit_rmp:
        metric_scalar: 1000.
        metric_length_scale: .01
        metric_exploder_eps: 1e-3
        metric_velocity_gate_length_scale: .01
        accel_damper_gain: 200.
        accel_potential_gain: 1.
        accel_potential_exploder_length_scale: .1
        accel_potential_exploder_eps: 1e-2
    joint_velocity_cap_rmp:
        max_velocity: 4.
        velocity_damping_region: 1.5
        damping_gain: 1000.0
        metric_weight: 100.
    target_rmp:
        accel_p_gain: 30.
        accel_d_gain: 85.
        accel_norm_eps: .075
        metric_alpha_length_scale: .05
        min_metric_alpha: .01
        max_metric_scalar: 10000
        min_metric_scalar: 2500
        proximity_metric_boost_scalar: 20.
        proximity_metric_boost_length_scale: .02
        xi_estimator_gate_std_dev: 20000.
        accept_user_weights: false
    axis_target_rmp:
        accel_p_gain: 210.
        accel_d_gain: 60.
        metric_scalar: 10
        proximity_metric_boost_scalar: 3000.
        proximity_metric_boost_length_scale: .08
        xi_estimator_gate_std_dev: 20000.
        accept_user_weights: false
    collision_rmp:
        damping_gain: 50.
        damping_std_dev: .04
        damping_robustness_eps: 1e-2
        damping_velocity_gate_length_scale: .01
        repulsion_gain: 800.
        repulsion_std_dev: .01
        metric_modulation_radius: .5
        metric_scalar: 10000.
        metric_exploder_std_dev: .02
        metric_exploder_eps: .001
    damping_rmp:
        accel_d_gain: 30.
        metric_scalar: 50.
        inertia: 100.

canonical_resolve:
    max_acceleration_norm: 50.
    projection_tolerance: .01
    verbose: false

# RMPflow 要求 body_cylinders 這個 key 必須存在（即使我們的手臂鏈沒有額外身體避障圓柱），
# 否則 lula.create_rmpflow 會直接丟 RuntimeError。
body_cylinders: []

# RMPflow 要求至少要有 body_collision_controllers（每個連桿的自我碰撞球半徑），
# 否則 lula.create_rmpflow 會直接丟 RuntimeError。半徑為粗估值。
body_collision_controllers:
    - name: right_shoulder_pitch_link
      radius: .06
    - name: right_shoulder_roll_link
      radius: .055
    - name: right_shoulder_yaw_link
      radius: .05
    - name: right_elbow_link
      radius: .05
    - name: right_wrist_roll_link
      radius: .04
    - name: right_wrist_pitch_link
      radius: .035
    - name: right_wrist_yaw_link
      radius: .035
